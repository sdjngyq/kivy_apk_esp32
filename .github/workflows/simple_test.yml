name: Simple Android Build Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install basic dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk python3-pip git

    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install kivy==2.3.1 kivymd==1.2.0 buildozer

    - name: Test basic functionality
      run: |
        python3 --version
        java -version
        buildozer --version
        echo "Basic setup test passed!"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          /tmp/
        retention-days: 1
