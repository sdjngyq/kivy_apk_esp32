name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl unzip openjdk-17-jdk python3-dev python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev libsqlite3-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kivy==2.3.1 kivymd==1.2.0 buildozer cython

    - name: Configure buildozer
      run: |
        mkdir -p ~/.buildozer
        cp buildozer.spec ~/.buildozer/

    - name: Copy buildozer spec
      run: |
        mkdir -p ~/.buildozer
        cp buildozer.spec ~/.buildozer/
        ls -la ~/.buildozer/

    - name: Download and setup python-for-android
      run: |
        mkdir -p ~/.buildozer/android/platform
        git clone --depth 1 https://github.com/kivy/python-for-android.git ~/.buildozer/android/platform/python-for-android

    - name: Test buildozer setup
      run: |
        echo "Testing buildozer setup..."
        buildozer --version
        buildozer --help | head -5

    - name: Build Android APK (Debug)
      run: |
        echo "Starting Android APK build..."
        export BUILDOZER_LOG_LEVEL=2
        echo "y" | timeout 30m buildozer android debug 2>&1 | tee /tmp/buildozer.log
      timeout-minutes: 35

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-apk
        path: |
          bin/*.apk
          bin/*.aab
        retention-days: 30

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          ~/.buildozer/android/platform/build.log
          .buildozer/android/platform/build.log
          /tmp/buildozer.log
        retention-days: 7
